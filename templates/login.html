{% extends "base.html" %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 1rem;">

    <div class="card"
        style="width: 100%; max-width: 400px; padding: 2.5rem; border-color: var(--accent-dim); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">

        <!-- Animated Logo Placehoder -->
        <div style="text-align: center; margin-bottom: 2rem; display: flex; justify-content: center;">
            <div
                style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--accent-dim);">
                <i class="fas fa-user-shield" style="font-size: 1.8rem; color: var(--accent);"></i>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem; letter-spacing: 3px;">WATCHTOWER</h2>
            <p class="text-muted" style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">Access
                Restricted</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">

            <div style="margin-bottom: 2rem;">
                <label for="password"
                    style="display: block; margin-bottom: 0.8rem; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Security
                    Clearance Code</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" required
                        style="background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 1rem 1rem 1rem 3rem; width: 100%; color: #fff; font-family: var(--font-mono); letter-spacing: 2px; transition: all 0.3s ease;"
                        placeholder="••••••••••••">
                    <span
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--accent-dim);">
                        <i class="fas fa-key"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; padding: 1rem; font-size: 1rem; letter-spacing: 2px;">
                Authenticate
            </button>
        </form>

        <div
            style="margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1.5rem; text-align: center;">
            <p style="font-size: 0.7rem; color: #444; font-family: var(--font-mono);">
                UNAUTHORIZED ACCESS IS PROHIBITED<br>
                SESSION ID: {{ request.remote_addr }}
            </p>
        </div>
    </div>
</div>

<style>
    /* Add specific focus style for the login input */
    input[type="password"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 15px rgba(102, 252, 241, 0.2);
    }
</style>
{% endblock %}
